# Render Blueprint Configuration
# This file helps configure your services on Render
# Note: You'll still need to manually create services and set environment variables

services:
  # Backend Django API Service
  - type: web
    name: pokebin-api
    env: python
    region: oregon
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    # --timeout 120: the admin "Sync now" button runs the eBay sync in-process;
    # the default 30s worker timeout is too short once it downloads images.
    startCommand: cd backend && gunicorn ecommerce.wsgi:application --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DB_NAME
        sync: false  # Set this manually from your RDS instance
      - key: DB_USER
        sync: false  # Set this manually
      - key: DB_PASSWORD
        sync: false  # Set this manually
      - key: DB_HOST
        sync: false  # Set this manually (RDS endpoint)
      - key: USE_R2
        value: "True"
      - key: R2_ACCOUNT_ID
        sync: false  # Set this manually from Cloudflare R2
      - key: R2_BUCKET_NAME
        sync: false  # Set this manually
      - key: R2_ACCESS_KEY_ID
        sync: false  # Set this manually
      - key: R2_SECRET_ACCESS_KEY
        sync: false  # Set this manually
      - key: R2_CUSTOM_DOMAIN
        sync: false  # Optional (e.g., media.pokebin.app). Falls back to <bucket>.r2.dev
      - key: SENDGRID_API_KEY
        sync: false  # Set this manually
      - key: DEFAULT_FROM_EMAIL
        value: noreply@pokebin.app  # Update to your email
      - key: FRONTEND_URL
        sync: false  # Set this after frontend deploys (e.g., https://pokebin.onrender.com)
      # eBay integration. The seller-facing sync runs in-process via the
      # "Sync now" button in Django admin (Ebay → eBay listings), so these
      # live on the web service rather than a separate worker.
      - key: EBAY_ENV
        value: production
      - key: EBAY_APP_ID
        sync: false
      - key: EBAY_CERT_ID
        sync: false
      - key: EBAY_DEV_ID
        sync: false
      - key: EBAY_RU_NAME
        sync: false
      - key: EBAY_STORE_CATEGORY_IDS
        sync: false  # Optional allowlist of store-category path names
      - key: EBAY_FALLBACK_CATEGORY_SLUG
        sync: false  # Required if the allowlist is used (category slug)
      - key: EBAY_VERIFICATION_TOKEN
        sync: false  # Account-deletion endpoint token (required for prod keys)
      - key: EBAY_DELETION_ENDPOINT
        sync: false  # Exact public URL of /ebay/account-deletion/

  # Frontend React Static Site
  - type: web
    name: pokebin-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this after backend deploys (e.g., https://pokebin-api.onrender.com)
      - key: VITE_PAYPAL_CLIENT_ID
        sync: false  # Set this manually (production PayPal client ID)
